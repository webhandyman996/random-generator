<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>崑山科技大學亂數產生器</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 唐草背景裝飾 -->
    <div class="karakusa-background">
        <svg class="karakusa-pattern" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="karakusa" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
                    <!-- 左側卷曲藤蔓 -->
                    <path d="M 30 20 Q 20 40 30 60 Q 40 80 20 100 Q 10 120 30 140 Q 50 160 70 150" 
                          stroke="#e8d4c8" stroke-width="2" fill="none" opacity="0.6"/>
                    <!-- 右側卷曲藤蔓 -->
                    <path d="M 170 30 Q 180 50 170 70 Q 160 90 180 110 Q 190 130 170 150 Q 150 170 130 160" 
                          stroke="#e8d4c8" stroke-width="2" fill="none" opacity="0.6"/>
                    <!-- 中央連接線 -->
                    <path d="M 100 40 Q 80 60 100 80 Q 120 100 100 120 Q 80 140 100 160" 
                          stroke="#f0e0d8" stroke-width="1.5" fill="none" opacity="0.4"/>
                    <!-- 裝飾葉片 -->
                    <circle cx="40" cy="50" r="3" fill="#d4a574" opacity="0.7"/>
                    <circle cx="160" cy="60" r="3" fill="#d4a574" opacity="0.7"/>
                    <circle cx="50" cy="100" r="2.5" fill="#d4a574" opacity="0.6"/>
                    <circle cx="150" cy="110" r="2.5" fill="#d4a574" opacity="0.6"/>
                </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#karakusa)"/>
        </svg>
    </div>

    <div class="container">
        <h1>崑山科技大學亂數產生器</h1>
        
        <div class="input-section">
            <div class="input-group">
                <label for="min-value">最小值:</label>
                <input type="number" id="min-value" placeholder="輸入最小值" value="1">
            </div>
            
            <div class="input-group">
                <label for="max-value">最大值:</label>
                <input type="number" id="max-value" placeholder="輸入最大值" value="100">
            </div>
        </div>
        
        <button id="generate-btn" class="generate-btn">產生亂數</button>
        
        <div class="result-section" id="result-section" style="display: none;">
            <p class="result-label">產生的亂數:</p>
            <p class="result-value" id="result-value">-</p>
        </div>
        
        <div class="info-section">
            <p>說明: 請輸入上下限範圍，點擊「產生亂數」按鈕即可獲得整數隨機數。</p>
        </div>
    </div>
    
    <!-- 角落裝飾 -->
    <div class="corner-decoration top-left"></div>
    <div class="corner-decoration top-right"></div>
    <div class="corner-decoration bottom-left"></div>
    <div class="corner-decoration bottom-right"></div>
    
    <script src="script.js"></script>
</body>
</html>
